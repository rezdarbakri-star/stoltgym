<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kommer Snart — Stolt Gym</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--accent:#00d4ff;--white:#f5f5f5;--muted:rgba(245,245,245,.5)}
body{background:var(--black);color:var(--white);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wrap{max-width:500px}
.logo{font-size:clamp(2rem,8vw,3.5rem);font-weight:800;letter-spacing:4px;text-transform:uppercase;margin-bottom:1rem;animation:fadeIn .8s ease}
.logo span{color:var(--accent)}
.divider{width:40px;height:2px;background:var(--accent);margin:1.5rem auto;opacity:.5}
h1{font-size:clamp(1.2rem,4vw,1.8rem);font-weight:300;letter-spacing:1px;margin-bottom:1rem;animation:fadeIn .8s ease .2s both}
p{font-size:.9rem;color:var(--muted);line-height:1.7;margin-bottom:2.5rem;animation:fadeIn .8s ease .4s both}
a{display:inline-block;padding:.8rem 2.5rem;border:1px solid var(--accent);color:var(--accent);text-decoration:none;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;transition:all .3s;animation:fadeIn .8s ease .6s both}
a:hover{background:var(--accent);color:var(--black)}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><img src="STOLTGYM_LOGGA_CROPPED.png" alt="Stolt Gym" style="height:clamp(40px,10vw,70px);filter:invert(1)"></div>
  <div class="divider"></div>
  <h1>Vi uppgraderar just nu</h1>
  <p>Sidan du söker är under konstruktion. Vi jobbar på att göra din upplevelse ännu bättre. Håll utkik!</p>
  <a href="https://www.stoltgym.se">Tillbaka till startsidan</a>
</div>
</body>
</html>
